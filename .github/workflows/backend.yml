name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  unit-tests:
    name: Unit tests (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run unit tests
        run: |
          cd backend
          npx jest tests/unit --ci --reporters=default

  integration-tests:
    name: Integration tests (DB-backed)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tax_advisor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tax_advisor_test
      # No ?schema= param — raw psql (libpq) rejects it ("invalid URI query
      # parameter"). The app/tests connect via the DB_* vars above; DATABASE_URL
      # is used only by the psql CLI steps below.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tax_advisor_test
      # 32+ chars as required by middleware/auth.js at boot
      JWT_SECRET: ci-test-only-jwt-secret-minimum-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Initialize schema (canonical schema.sql)
        run: |
          # schema.sql (repo root) is the canonical init path used in prod.
          # The Prisma 0_init migration is unusable (DEFAULT-based generated
          # columns Postgres rejects) — schema.sql + phase-* is the real path.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f schema.sql

      - name: Apply phase migrations
        run: |
          cd backend
          for f in $(ls database/migrations/phase-*.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          # phase-t (sorted AFTER phase-d/phase-m) recreates the form tables,
          # dropping the (user_id, tax_year) uniques those add. Re-apply them so
          # /api/register's ON CONFLICT (user_id, tax_year) works (matches the
          # live cluster's hand-applied t→…→d/m order).
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/migrations/phase-d-form-unique-constraints.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/migrations/phase-m-income-wealth-recon-uniques.sql
          # ensureTaxReturn (helpers/ensureTaxReturn.js) upserts tax_returns with
          # ON CONFLICT (user_id, tax_year_id); schema.sql only ships the
          # (user_id, tax_year) unique. Add the id-based one prod has so form
          # saves work.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_constraint WHERE conname='tax_returns_user_year_id_unique') THEN ALTER TABLE tax_returns ADD CONSTRAINT tax_returns_user_year_id_unique UNIQUE (user_id, tax_year_id); END IF; END \$\$;"
          # schema.sql ships tax_returns.fk_user (user_id→users) WITHOUT cascade
          # (prod has cascade; phase-p assumed it already did). Make it cascade so
          # admin user-delete works. NOTE: real fix is schema.sql — drift flagged.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "ALTER TABLE tax_returns DROP CONSTRAINT IF EXISTS fk_user; ALTER TABLE tax_returns ADD CONSTRAINT fk_user FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE ON UPDATE CASCADE;"

      - name: Seed tax years + slabs
        run: |
          # schema.sql + phase-* already seed years/slabs, so the slab inserts
          # UPSERT (DO UPDATE) to force the exact FA-2025 values the integration
          # tests assert. tax_years.filing_deadline and tax_slabs.effective_from
          # are NOT NULL — must be supplied.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            INSERT INTO tax_years (id, tax_year, is_current, is_active, start_date, end_date, filing_deadline, description)
            VALUES
              (gen_random_uuid(), '2024-25', false, true, '2024-07-01', '2025-06-30', '2025-09-30', 'TY 2024-25'),
              (gen_random_uuid(), '2025-26', true,  true, '2025-07-01', '2026-06-30', '2026-09-30', 'TY 2025-26')
            ON CONFLICT (tax_year) DO NOTHING;

            INSERT INTO tax_slabs (id, tax_year_id, slab_name, slab_order, min_income, max_income, tax_rate, slab_type, fixed_amount, effective_from)
            SELECT gen_random_uuid(), ty.id, v.name, v.ord, v.min, v.max, v.rate, 'individual', v.fixed, ty.start_date
            FROM tax_years ty, (VALUES
              ('slab_1', 1, 0::numeric, 600000::numeric, 0::numeric, 0::numeric),
              ('slab_2', 2, 600001, 1200000, 0.01, 0),
              ('slab_3', 3, 1200001, 2200000, 0.11, 6000),
              ('slab_4', 4, 2200001, 3200000, 0.23, 116000),
              ('slab_5', 5, 3200001, 4100000, 0.30, 346000),
              ('slab_6', 6, 4100001, NULL, 0.35, 616000)
            ) AS v(name, ord, min, max, rate, fixed)
            WHERE ty.tax_year = '2025-26'
            ON CONFLICT (tax_year_id, slab_type, slab_order) DO UPDATE SET
              min_income=EXCLUDED.min_income, max_income=EXCLUDED.max_income, tax_rate=EXCLUDED.tax_rate,
              fixed_amount=EXCLUDED.fixed_amount, slab_name=EXCLUDED.slab_name, effective_from=EXCLUDED.effective_from;

            INSERT INTO tax_slabs (id, tax_year_id, slab_name, slab_order, min_income, max_income, tax_rate, slab_type, fixed_amount, effective_from)
            SELECT gen_random_uuid(), ty.id, v.name, v.ord, v.min, v.max, v.rate, 'individual', v.fixed, ty.start_date
            FROM tax_years ty, (VALUES
              ('slab_1', 1, 0::numeric, 600000::numeric, 0::numeric, 0::numeric),
              ('slab_2', 2, 600001, 1200000, 0.05, 0),
              ('slab_3', 3, 1200001, 2200000, 0.15, 0),
              ('slab_4', 4, 2200001, 3200000, 0.25, 0),
              ('slab_5', 5, 3200001, 4100000, 0.30, 0),
              ('slab_6', 6, 4100001, NULL, 0.35, 0)
            ) AS v(name, ord, min, max, rate, fixed)
            WHERE ty.tax_year = '2024-25'
            ON CONFLICT (tax_year_id, slab_type, slab_order) DO UPDATE SET
              min_income=EXCLUDED.min_income, max_income=EXCLUDED.max_income, tax_rate=EXCLUDED.tax_rate,
              fixed_amount=EXCLUDED.fixed_amount, slab_name=EXCLUDED.slab_name, effective_from=EXCLUDED.effective_from;
          "

      - name: Run integration tests
        run: |
          cd backend
          npx jest tests/integration --ci --runInBand --reporters=default
