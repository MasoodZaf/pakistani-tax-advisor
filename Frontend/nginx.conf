server {
    listen 80;
    server_name localhost;
    
    # Serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Handle React Router - all routes should serve index.html
        try_files $uri $uri/ /index.html;

        # index.html (and the SPA fallback for every route) must always be
        # revalidated, otherwise browsers heuristically cache it and keep
        # loading a stale bundle hash after a deploy — the hashed JS/CSS below
        # is immutable, but the HTML that points at it must never be cached.
        # (This block serves only HTML; the regex location handles assets.)
        add_header Cache-Control "no-cache" always;

        # Add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    }
    
    # Cache static assets. `root` MUST be set here — nginx does NOT inherit it
    # from the parent `location /` block, and without it nginx falls back to
    # the compiled-in /etc/nginx/html, returning 404 for every asset and
    # blanking out the whole React app.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # `must-revalidate` is NOT a valid gzip_proxied token (it belongs in
    # Cache-Control). Including it makes nginx refuse to start.
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/javascript
        application/json;
}