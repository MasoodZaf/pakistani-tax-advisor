version: '3.8'

# DEV: runs Postgres only.
# Start with: docker compose up -d
# Run backend/frontend locally with: npm run dev

services:
  database:
    image: postgres:15
    container_name: tax_advisor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tax_advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init order matches docker-entrypoint-initdb.d (lex sort):
      # 01-schema.sql creates the canonical schema; the corrective migrations
      # in backend/database/migrations/ are NOT auto-applied here — for a fresh
      # dev DB run them manually after first boot (see README/AGENTS.md).
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: tax_advisor_network