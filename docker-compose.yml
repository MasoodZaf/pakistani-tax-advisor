version: '3.8'

# DEV: runs Postgres only.
# Start with: docker compose up -d
# Run backend/frontend locally with: npm run dev

services:
  database:
    image: postgres:15
    container_name: tax_advisor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tax_advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrate-2025-26.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: tax_advisor_network